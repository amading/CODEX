<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tik Tok Tap Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="game-card">
      <!-- Header ng laro: dito makikita ang score, combo, at oras -->
      <header class="game-header">
        <div>
          <p class="eyebrow">Tik Tok Tik Tok</p>
          <h1>Beat Tap Game</h1>
        </div>
        <div class="stats">
          <span>Score <strong id="score">0</strong></span>
          <span>Combo <strong id="combo">0</strong></span>
          <span>Time <strong id="time">30</strong>s</span>
        </div>
      </header>

      <!-- Game board: pindutin ang bilog kapag pumasok sa beat zone -->
      <div class="beat-board" id="beat-board">
        <div class="beat-zone">TAP ZONE</div>
        <button id="beat-dot" class="beat-dot" type="button" aria-label="Tap target"></button>
      </div>

      <div class="feedback" id="feedback">Press Start, then tap the moving beat.</div>

      <div class="controls">
        <button id="start-btn" type="button">Start Game</button>
        <button id="reset-btn" type="button">Reset</button>
      </div>

      <!-- Guide ng laro: puwede mong baguhin ang rules sa script.js -->
      <aside class="tips">
        <h2>Advanced Tips</h2>
        <ul>
          <li>Tap inside the bright zone for more points.</li>
          <li>Keep your combo alive by avoiding missed taps.</li>
          <li>The beat gets faster as your score improves.</li>
        </ul>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
